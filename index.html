<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend - Personal Finance Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .setup-section, .main-section { margin-bottom: 25px; padding: 15px; border-radius: 8px; background: #fafafa; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        .report { margin-top: 25px; padding: 15px; border-left: 5px solid #3498db; background: #e8f4f8; }
        .alert { background: #fdf2f2; border-left: 5px solid #e74c3c; color: #c0392b; padding: 15px; margin-top: 15px; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1> SmartSpend Tracker</h1>
        
        <div id="setup" class="setup-section">
            <label>Set your Monthly Savings Goal ($):</label>
            <input type="number" id="goalInput" placeholder="e.g. 500">
            <button onclick="setGoal()">Initialize Wallet</button>
        </div>

        <div id="dashboard" class="main-section" style="display:none;">
            <h3>Add Transaction</h3>
            <label>Amount ($):</label>
            <input type="number" id="amount" placeholder="0.00">
            
            <label>Category:</label>
            <select id="category">
                <option value="Food">Food</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
            
            <button onclick="addTransaction()" style="background-color: #3498db;">Record Spending</button>

            <div class="report">
                <h4>Financial Report:</h4>
                <p>Savings Goal: $<span id="dispGoal">0</span></p>
                <p>Total Spent: $<span id="dispSpent">0</span></p>
                <p>Remaining Budget: $<span id="dispRemaining">0</span></p>
            </div>

            <div id="alertBox" class="alert">
                <strong>Budget Alert!</strong> You have exceeded your spending safety threshold for this category!
            </div>
        </div>
    </div>

    <script>
        let savingsGoal = 0;
        let totalSpent = 0;

        function setGoal() {
            const g = document.getElementById('goalInput').value;
            if(!g || g <= 0) { alert('Please enter a valid goal'); return; }
            savingsGoal = parseFloat(g);
            document.getElementById('dispGoal').innerText = savingsGoal;
            document.getElementById('dispRemaining').innerText = savingsGoal;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function addTransaction() {
            const amt = parseFloat(document.getElementById('amount').value);
            if(!amt || amt <= 0) { alert('Please enter a valid amount'); return; }
            
            totalSpent += amt;
            let remaining = savingsGoal - totalSpent;

            document.getElementById('dispSpent').innerText = totalSpent.toFixed(2);
            document.getElementById('dispRemaining').innerText = remaining.toFixed(2);

            // Simulate spending alerts logic from your BudgetCategory.java
            if(totalSpent > savingsGoal * 0.8) {
                document.getElementById('alertBox').style.display = 'block';
            }
            
            document.getElementById('amount').value = '';
        }
    </script>
</body>
</html>
